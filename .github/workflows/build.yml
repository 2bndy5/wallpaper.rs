name: Build

on:
  push:
    branches: [custom]
  pull_request:
    branches: [custom]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: rustup update --no-self-update
      - run: cargo clippy
      - run: cargo fmt --check
      - run: cargo test
