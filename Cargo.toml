[package]
name = "wallpaper"
version = "4.0.0"
edition = "2018"
authors = ["reujab <reujab@gmail.com>"]
description = "Gets and sets the desktop wallpaper/background."
repository = "https://github.com/reujab/wallpaper.rs"
readme = "readme.md"
keywords = ["desktop", "wallpaper", "background"]
categories = ["api-bindings"]
license = "Unlicense"

[dependencies]
dirs = { version = "6.0.0", optional = true }
thiserror = "2.0.11"
reqwest = { version = "0.12.12", optional = true, features = ["blocking"] }

[target.'cfg(unix)'.dependencies]
enquote = "1.1.0"

[target.'cfg(all(unix, not(target_os = "macos")))'.dependencies]
rust-ini = "0.21.1"
dirs = "6.0.0"

[target.'cfg(windows)'.dependencies]
winapi = { version = "0.3.9", features = ["winuser"] }
winreg = "0.55.0"

[features]
from_url = ["dirs", "reqwest"]
